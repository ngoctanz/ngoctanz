<svg width="1200" height="450" viewBox="0 0 1200 450" xmlns="http://www.w3.org/2000/svg">
<defs>
  <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="450">
    <stop stop-color="#0B1220"/>
    <stop offset=".5" stop-color="#101329"/>
    <stop offset="1" stop-color="#0B1220"/>
  </linearGradient>
  <linearGradient id="accent" x1="100" y1="0" x2="1100" y2="450">
    <stop stop-color="#00D9FF"/>
    <stop offset=".5" stop-color="#7C5CFF"/>
    <stop offset="1" stop-color="#FF3D9A"/>
  </linearGradient>
  <filter id="glow"><feGaussianBlur stdDeviation="4" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
    <path d="M0,0 L8,4 L0,8 Z" fill="#60718A"/>
  </marker>
</defs>
<rect width="1200" height="450" rx="24" fill="url(#bg)"/>
<rect x="1" y="1" width="1198" height="448" rx="23" fill="none" stroke="url(#accent)" stroke-opacity=".35" stroke-width="2"/>

<text x="48" y="55" font-family="monospace" font-size="18" fill="#7EE7F2">web.system.map</text>
<text x="48" y="86" font-family="sans-serif" font-size="14" fill="#7F8FA6">How I think about a production web application</text>

<!-- connectors -->
<g stroke="#60718A" stroke-width="2" fill="none" marker-end="url(#arrow)" opacity=".85">
  <path d="M275 205 H385"/>
  <path d="M575 205 H685"/>
  <path d="M875 205 H985"/>
  <path d="M780 258 V335 H590"/>
  <path d="M480 258 V335 H590"/>
</g>

<!-- Frontend -->
<g transform="translate(55 135)">
  <rect width="220" height="125" rx="18" fill="#101B2E" stroke="#00D9FF" stroke-opacity=".75"/>
  <text x="22" y="34" font-family="sans-serif" font-weight="700" font-size="18" fill="#9AF4FF">INTERFACE</text>
  <text x="22" y="67" font-family="monospace" font-size="14" fill="#DCE7F5">React · Next.js</text>
  <text x="22" y="91" font-family="monospace" font-size="14" fill="#8FA2BA">UI · UX · SSR</text>
  <circle cx="195" cy="28" r="6" fill="#00D9FF" filter="url(#glow)">
    <animate attributeName="opacity" values=".3;1;.3" dur="2s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- API -->
<g transform="translate(385 135)">
  <rect width="190" height="125" rx="18" fill="#17162F" stroke="#7C5CFF" stroke-opacity=".8"/>
  <text x="22" y="34" font-family="sans-serif" font-weight="700" font-size="18" fill="#C5B9FF">APPLICATION</text>
  <text x="22" y="67" font-family="monospace" font-size="14" fill="#DCE7F5">Node · NestJS</text>
  <text x="22" y="91" font-family="monospace" font-size="14" fill="#9E94C5">REST · Business Logic</text>
  <circle cx="165" cy="28" r="6" fill="#7C5CFF" filter="url(#glow)">
    <animate attributeName="opacity" values="1;.3;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- Security -->
<g transform="translate(685 135)">
  <rect width="190" height="125" rx="18" fill="#23152A" stroke="#FF3D9A" stroke-opacity=".8"/>
  <text x="22" y="34" font-family="sans-serif" font-weight="700" font-size="18" fill="#FF9CC8">SECURITY</text>
  <text x="22" y="67" font-family="monospace" font-size="14" fill="#DCE7F5">OAuth · JWT · RBAC</text>
  <text x="22" y="91" font-family="monospace" font-size="14" fill="#BD8DA5">Validation · Rate Limit</text>
  <circle cx="165" cy="28" r="6" fill="#FF3D9A" filter="url(#glow)">
    <animate attributeName="opacity" values=".3;1;.3" dur="1.8s" repeatCount="indefinite"/>
  </circle>
</g>

<!-- External -->
<g transform="translate(985 135)">
  <rect width="160" height="125" rx="18" fill="#17212B" stroke="#42D3A5" stroke-opacity=".75"/>
  <text x="20" y="34" font-family="sans-serif" font-weight="700" font-size="17" fill="#8BE8C8">INTEGRATIONS</text>
  <text x="20" y="67" font-family="monospace" font-size="14" fill="#DCE7F5">Payments</text>
  <text x="20" y="91" font-family="monospace" font-size="14" fill="#8FB8AA">OAuth · APIs</text>
</g>

<!-- Data -->
<g transform="translate(455 335)">
  <rect width="270" height="78" rx="17" fill="#111D27" stroke="url(#accent)" stroke-opacity=".8"/>
  <text x="22" y="31" font-family="sans-serif" font-weight="700" font-size="18" fill="#E7EEFA">DATA &amp; RELIABILITY</text>
  <text x="22" y="57" font-family="monospace" font-size="14" fill="#9FB0C6">PostgreSQL · MongoDB · Fallback · Concurrency</text>
</g>
</svg>
