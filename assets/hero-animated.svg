<svg width="1600" height="460" viewBox="0 0 1600 460" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="460">
      <stop offset="0%" stop-color="#0B1220"/>
      <stop offset="48%" stop-color="#10192E"/>
      <stop offset="100%" stop-color="#0D1628"/>
    </linearGradient>

    <radialGradient id="blobA" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(320 70) rotate(36) scale(480 240)">
      <stop offset="0" stop-color="#38BDF8" stop-opacity=".95"/>
      <stop offset="1" stop-color="#38BDF8" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobB" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1240 140) rotate(24) scale(520 270)">
      <stop offset="0" stop-color="#8B5CF6" stop-opacity=".92"/>
      <stop offset="1" stop-color="#8B5CF6" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="blobC" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(980 380) rotate(-12) scale(560 200)">
      <stop offset="0" stop-color="#14B8A6" stop-opacity=".55"/>
      <stop offset="1" stop-color="#14B8A6" stop-opacity="0"/>
    </radialGradient>

    <linearGradient id="nameGradient" x1="120" y1="0" x2="970" y2="0">
      <stop offset="0%" stop-color="#F8FAFC"/>
      <stop offset="28%" stop-color="#7DD3FC"/>
      <stop offset="60%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#F8FAFC"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        values="-220 0;220 0;-220 0" dur="11s" repeatCount="indefinite"/>
    </linearGradient>

    <linearGradient id="pillGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#38BDF8"/>
      <stop offset="100%" stop-color="#8B5CF6"/>
    </linearGradient>

    <linearGradient id="lineGradient" x1="0" y1="0" x2="1600" y2="0">
      <stop offset="0%" stop-color="#38BDF8" stop-opacity=".0"/>
      <stop offset="20%" stop-color="#38BDF8" stop-opacity=".55"/>
      <stop offset="55%" stop-color="#8B5CF6" stop-opacity=".65"/>
      <stop offset="100%" stop-color="#14B8A6" stop-opacity="0"/>
    </linearGradient>

    <linearGradient id="shine" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0"/>
      <stop offset=".5" stop-color="#FFFFFF" stop-opacity=".88"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </linearGradient>

    <pattern id="microGrid" width="34" height="34" patternUnits="userSpaceOnUse">
      <path d="M34 0H0V34" fill="none" stroke="#FFFFFF" stroke-opacity=".035"/>
      <circle cx="0" cy="0" r="1.5" fill="#FFFFFF" fill-opacity=".05"/>
    </pattern>

    <filter id="cardShadow" x="-40%" y="-40%" width="180%" height="180%">
      <feDropShadow dx="0" dy="16" stdDeviation="22" flood-color="#0F172A" flood-opacity=".35"/>
    </filter>

    <filter id="glow">
      <feGaussianBlur stdDeviation="16" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <mask id="titleMask">
      <rect width="1600" height="460" fill="black"/>
      <rect x="-300" y="0" width="220" height="460" fill="url(#shine)" transform="skewX(-18)">
        <animate attributeName="x" values="-260;1260;1260" dur="7.5s" repeatCount="indefinite"/>
      </rect>
    </mask>
  </defs>

  <rect width="1600" height="460" rx="30" fill="url(#bg)"/>
  <rect width="1600" height="460" rx="30" fill="url(#microGrid)"/>

  <!-- animated glow blobs -->
  <ellipse cx="330" cy="95" rx="420" ry="210" fill="url(#blobA)">
    <animate attributeName="cx" values="330;390;330" dur="14s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="95;120;95" dur="14s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="1240" cy="145" rx="500" ry="240" fill="url(#blobB)">
    <animate attributeName="cx" values="1240;1180;1240" dur="16s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="145;120;145" dur="16s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="980" cy="385" rx="520" ry="180" fill="url(#blobC)">
    <animate attributeName="cx" values="980;1040;980" dur="18s" repeatCount="indefinite"/>
  </ellipse>

  <!-- fiber/light paths -->
  <g opacity=".7">
    <path d="M-80 360 C200 248 390 430 650 322 C930 206 1185 352 1680 160"
          fill="none" stroke="url(#lineGradient)" stroke-width="34" stroke-linecap="round" filter="url(#glow)">
      <animate attributeName="d"
        values="
        M-80 360 C200 248 390 430 650 322 C930 206 1185 352 1680 160;
        M-80 325 C220 430 410 262 690 332 C1010 412 1210 236 1680 235;
        M-80 360 C200 248 390 430 650 322 C930 206 1185 352 1680 160"
        dur="13s" repeatCount="indefinite"/>
    </path>

    <path d="M-30 392 C280 314 495 458 745 358 C1045 242 1280 362 1650 275"
          fill="none" stroke="#FFFFFF" stroke-opacity=".18" stroke-width="2.5" stroke-dasharray="3 10">
      <animate attributeName="stroke-dashoffset" values="0;130" dur="6s" repeatCount="indefinite"/>
    </path>
  </g>

  <!-- orbit rings -->
  <g opacity=".42">
    <circle cx="1372" cy="95" r="72" fill="none" stroke="#93C5FD" stroke-width="1.6" stroke-dasharray="5 8">
      <animateTransform attributeName="transform" type="rotate" from="0 1372 95" to="360 1372 95" dur="18s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1460" cy="320" r="48" fill="none" stroke="#C4B5FD" stroke-width="1.6" stroke-dasharray="4 8">
      <animateTransform attributeName="transform" type="rotate" from="360 1460 320" to="0 1460 320" dur="12s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- left content -->
  <g transform="translate(105 82)">
    <rect x="0" y="0" width="286" height="50" rx="16" fill="#0F172A" fill-opacity=".62" stroke="url(#pillGradient)" stroke-opacity=".85"/>
    <circle cx="26" cy="25" r="5" fill="#22C55E">
      <animate attributeName="opacity" values=".35;1;.35" dur="2s" repeatCount="indefinite"/>
    </circle>
    <text x="52" y="31" font-family="Inter, Arial, sans-serif" font-size="18" font-weight="700" letter-spacing="5" fill="#E0F2FE">WEB DEVELOPER</text>

    <text x="0" y="165" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2.5" fill="url(#nameGradient)">LE NGOC TAN</text>
    <text x="0" y="165" font-family="Inter, Arial, sans-serif" font-size="78" font-weight="800" letter-spacing="-2.5" fill="#FFFFFF" opacity=".34" mask="url(#titleMask)">LE NGOC TAN</text>

    <text x="0" y="228" font-family="Inter, Arial, sans-serif" font-size="28" fill="#CBD5E1">
      Crafting modern web experiences with
      <tspan fill="#7DD3FC" font-weight="700"> style</tspan>,
      <tspan fill="#A78BFA" font-weight="700"> speed</tspan>,
      and
      <tspan fill="#2DD4BF" font-weight="700"> stability</tspan>.
    </text>

    <text x="0" y="286" font-family="Inter, Arial, sans-serif" font-size="18" fill="#94A3B8">
      React • Next.js • Node.js • NestJS • PostgreSQL • MongoDB
    </text>
  </g>

  <!-- right glass panel -->
  <g transform="translate(1090 92)" filter="url(#cardShadow)">
    <rect width="355" height="230" rx="28" fill="#FFFFFF" fill-opacity=".08" stroke="#FFFFFF" stroke-opacity=".18"/>
    <rect x="28" y="28" width="104" height="28" rx="14" fill="#0F172A" fill-opacity=".5" stroke="#FFFFFF" stroke-opacity=".15"/>
    <text x="80" y="47" text-anchor="middle" font-family="Inter, Arial, sans-serif" font-size="14" font-weight="700" fill="#E2E8F0">CURRENT MODE</text>

    <rect x="28" y="88" width="240" height="16" rx="8" fill="#FFFFFF" fill-opacity=".82"/>
    <rect x="28" y="122" width="190" height="12" rx="6" fill="#BAE6FD" fill-opacity=".92"/>
    <rect x="28" y="149" width="220" height="12" rx="6" fill="#DDD6FE" fill-opacity=".92"/>
    <rect x="28" y="176" width="145" height="12" rx="6" fill="#99F6E4" fill-opacity=".92"/>

    <circle cx="290" cy="170" r="30" fill="url(#shine)" opacity=".75" filter="url(#glow)">
      <animate attributeName="cx" values="290;250;290" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="cy" values="170;130;170" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".35;.9;.35" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- floating micro particles -->
  <g>
    <circle cx="1010" cy="64" r="3.5" fill="#7DD3FC">
      <animate attributeName="cy" values="64;42;64" dur="4.5s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".2;1;.2" dur="4.5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="980" cy="338" r="4" fill="#A78BFA">
      <animate attributeName="cx" values="980;950;980" dur="5.3s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="1;.25;1" dur="5.3s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1510" cy="188" r="3.5" fill="#2DD4BF">
      <animate attributeName="cy" values="188;160;188" dur="3.8s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".25;1;.25" dur="3.8s" repeatCount="indefinite"/>
    </circle>
    <circle cx="1322" cy="368" r="2.8" fill="#F8FAFC">
      <animate attributeName="cy" values="368;338;368" dur="6s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values=".12;.8;.12" dur="6s" repeatCount="indefinite"/>
    </circle>
  </g>

  <!-- border highlight -->
  <rect x="1.2" y="1.2" width="1597.6" height="457.6" rx="28.8"
        fill="none" stroke="#FFFFFF" stroke-opacity=".08" stroke-width="1.8"/>
</svg>
