<svg width="1200" height="360" viewBox="0 0 1200 360" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="360" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07111F"/>
      <stop offset="0.45" stop-color="#111233"/>
      <stop offset="1" stop-color="#07111F"/>
    </linearGradient>
    <linearGradient id="accent" x1="150" y1="40" x2="1050" y2="320" gradientUnits="userSpaceOnUse">
      <stop stop-color="#00E5FF"/>
      <stop offset="0.5" stop-color="#8B5CF6"/>
      <stop offset="1" stop-color="#FF3D9A"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M 38 0 L 0 0 0 38" fill="none" stroke="#FFFFFF" stroke-opacity="0.045"/>
    </pattern>
  </defs>

  <rect width="1200" height="360" rx="24" fill="url(#bg)"/>
  <rect width="1200" height="360" rx="24" fill="url(#grid)"/>

  <circle cx="180" cy="70" r="3" fill="#00E5FF">
    <animate attributeName="opacity" values="0.2;1;0.2" dur="2.6s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1010" cy="78" r="4" fill="#FF3D9A">
    <animate attributeName="opacity" values="1;0.25;1" dur="3.2s" repeatCount="indefinite"/>
  </circle>
  <circle cx="1080" cy="285" r="3" fill="#8B5CF6">
    <animate attributeName="opacity" values="0.25;1;0.25" dur="2.1s" repeatCount="indefinite"/>
  </circle>

  <path d="M70 292 C260 205 325 330 520 245 C700 165 820 280 1135 135"
        stroke="url(#accent)" stroke-opacity="0.28" stroke-width="2" fill="none">
    <animate attributeName="stroke-dasharray" values="0 1800;1800 0" dur="5s" repeatCount="indefinite"/>
  </path>

  <g transform="translate(84 70)">
    <rect width="470" height="220" rx="18" fill="#0C1626" stroke="#243247"/>
    <circle cx="28" cy="25" r="6" fill="#FF5F57"/>
    <circle cx="49" cy="25" r="6" fill="#FEBC2E"/>
    <circle cx="70" cy="25" r="6" fill="#28C840"/>
    <text x="28" y="70" fill="#89F7FE" font-family="monospace" font-size="19">$ whoami</text>
    <text x="28" y="106" fill="#E7EEF8" font-family="monospace" font-size="20">Le Ngoc Tan</text>
    <text x="28" y="139" fill="#A78BFA" font-family="monospace" font-size="18">Web Developer</text>
    <text x="28" y="176" fill="#8AA0B8" font-family="monospace" font-size="15">React / Next.js / Node.js / NestJS</text>
    <rect x="28" y="194" width="11" height="20" fill="#00E5FF">
      <animate attributeName="opacity" values="1;0;1" dur="1s" repeatCount="indefinite"/>
    </rect>
  </g>

  <g transform="translate(626 87)">
    <text x="0" y="0" fill="#FFFFFF" font-family="sans-serif" font-weight="700" font-size="44">BUILDING THE WEB</text>
    <text x="0" y="56" fill="url(#accent)" font-family="sans-serif" font-weight="800" font-size="48">BEYOND THE UI.</text>
    <text x="0" y="110" fill="#AAB8CA" font-family="sans-serif" font-size="18">Fast interfaces. Secure systems. Real products.</text>

    <g transform="translate(0 146)">
      <rect width="150" height="42" rx="21" fill="#00E5FF" fill-opacity="0.10" stroke="#00E5FF" stroke-opacity="0.55"/>
      <text x="75" y="27" text-anchor="middle" fill="#8FF5FF" font-family="sans-serif" font-size="14">FRONTEND</text>
      <rect x="166" width="150" height="42" rx="21" fill="#8B5CF6" fill-opacity="0.10" stroke="#8B5CF6" stroke-opacity="0.6"/>
      <text x="241" y="27" text-anchor="middle" fill="#C4B5FD" font-family="sans-serif" font-size="14">BACKEND</text>
      <rect x="332" width="150" height="42" rx="21" fill="#FF3D9A" fill-opacity="0.10" stroke="#FF3D9A" stroke-opacity="0.6"/>
      <text x="407" y="27" text-anchor="middle" fill="#FDA4CF" font-family="sans-serif" font-size="14">PERFORMANCE</text>
    </g>
  </g>

  <rect x="1" y="1" width="1198" height="358" rx="23" stroke="url(#accent)" stroke-opacity="0.35" stroke-width="2"/>
</svg>
